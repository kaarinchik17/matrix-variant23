name: CI/CD Pipeline

# Когда запускать
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

# Что делать
jobs:
  # ЭТАП 1: Сборка
  build:
    runs-on: ubuntu-latest
    steps:
      - name:  Скачиваем код
        uses: actions/checkout@v4
      
      - name:  Устанавливаем компилятор
        run: |
          sudo apt update
          sudo apt install -y gcc make
      
      - name: Запускаем сборку
        run: ./cicd/build.sh
      
      - name:  Сохраняем результат
        uses: actions/upload-artifact@v4
        with:
          name: build-result
          path: |
            usr/local/bin/matrix
            DEBIAN/
          retention-days: 1

  # ЭТАП 2: Тестирование
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name:  Скачиваем код
        uses: actions/checkout@v4
      
      - name:  Скачиваем результат сборки
        uses: actions/download-artifact@v4
        with:
          name: build-result
      
      - name: Запускаем тесты
        run: |
          chmod +x cicd/test.sh
          ./cicd/test.sh
      
      - name: Передаём результат
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: |
            usr/local/bin/matrix
            DEBIAN/
          retention-days: 1

  # ЭТАП 3: Сборка пакета
  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name:  Скачиваем код
        uses: actions/checkout@v4
      
      - name: Скачиваем результат тестов
        uses: actions/download-artifact@v4
        with:
          name: test-result
      
      - name:  Устанавливаем dpkg
        run: sudo apt install -y dpkg-dev
      
      - name:  Собираем deb-пакет
        run: ./cicd/package.sh
      
      - name: Сохраняем пакет
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: "*.deb"
          retention-days: 7
